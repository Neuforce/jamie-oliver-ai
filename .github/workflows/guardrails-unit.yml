name: Guardrails unit tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-search-guardrails:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-search
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend-search/pyproject.toml

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install -e "${GITHUB_WORKSPACE}/packages/ccai"
          pip install -e "${GITHUB_WORKSPACE}/packages/jamie-guardrails"

      - name: Pytest guardrails (no live NeuGate certification)
        run: |
          PYTHONPATH=. python -m pytest \
            tests/test_guardrails_gate.py \
            tests/test_guardrails_inline_fallback.py \
            tests/test_guardrails_chat_agent.py \
            tests/test_guardrails_policy_loader.py \
            tests/test_guardrails_policy_render.py \
            tests/test_guardrails_golden_cooking.py \
            tests/test_guardrails_neugate_client.py \
            tests/test_preprompt_v1_2.py \
            -q --tb=short

  backend-voice-guardrails:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-voice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install --upgrade pip && pip install "poetry~=2.1.0"

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry env use "$(which python)"
          pip install -e "${GITHUB_WORKSPACE}/packages/jamie-guardrails"
          poetry install --with dev --no-interaction --no-ansi

      - name: Pytest voice guardrails
        run: poetry run pytest tests/test_voice_guardrails.py -q --tb=short
